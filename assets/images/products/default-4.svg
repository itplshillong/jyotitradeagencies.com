<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a0f35"/>
    </linearGradient>
    <linearGradient id="pur" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="510" cy="65" r="145" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="90" cy="335" r="95" fill="#10B981" opacity="0.05"/>
  <!-- Microscope -->
  <g transform="translate(220,195)">
    <!-- Base -->
    <rect x="-55" y="80" width="110" height="18" rx="6" fill="#475569"/>
    <rect x="-42" y="65" width="84" height="20" rx="5" fill="#475569" opacity="0.8"/>
    <!-- Arm (vertical pillar) -->
    <rect x="-10" y="-85" width="20" height="160" rx="6" fill="#64748B"/>
    <rect x="-6" y="-80" width="8" height="155" rx="4" fill="white" opacity="0.08"/>
    <!-- Arm curve -->
    <path d="M 10 -60 Q 55 -60 55 -20 L 55 10 Q 55 30 35 30 L 10 30" fill="none" stroke="#64748B" stroke-width="18" stroke-linecap="round"/>
    <!-- Eyepiece tube -->
    <rect x="-14" y="-100" width="28" height="32" rx="6" fill="#94A3B8"/>
    <!-- Eyepiece top -->
    <ellipse cx="0" cy="-100" rx="18" ry="8" fill="#B0BEC5"/>
    <!-- Objective lens barrel -->
    <rect x="-12" y="-30" width="24" height="50" rx="8" fill="#475569"/>
    <ellipse cx="0" cy="20" rx="14" ry="7" fill="#1E293B"/>
    <ellipse cx="0" cy="20" rx="9" ry="4.5" fill="url(#teal)" opacity="0.6"/>
    <!-- Stage -->
    <rect x="-40" y="28" width="80" height="12" rx="4" fill="#64748B"/>
    <!-- Stage clips -->
    <rect x="-35" y="24" width="10" height="8" rx="2" fill="#94A3B8"/>
    <rect x="25" y="24" width="10" height="8" rx="2" fill="#94A3B8"/>
    <!-- Light circle on stage -->
    <circle cx="0" cy="34" r="8" fill="#10B981" opacity="0.25"/>
    <!-- Focus knobs -->
    <circle cx="-22" cy="15" r="8" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="-22" cy="35" r="6" fill="#7C3AED" opacity="0.7"/>
  </g>
  <!-- Test tubes (right) -->
  <g transform="translate(380,185)">
    <!-- Rack -->
    <rect x="-30" y="-5" width="130" height="10" rx="4" fill="#475569"/>
    <!-- Test tube 1 -->
    <g transform="translate(0,0)">
      <rect x="-9" y="-85" width="18" height="90" rx="9 9 0 0" fill="none" stroke="#10B981" stroke-width="2" opacity="0.8"/>
      <path d="M -9 5 Q -9 20 0 20 Q 9 20 9 5 Z" fill="#10B981" opacity="0.8"/>
      <rect x="-9 " y="-40" width="18" height="45" rx="0 0 9 9" fill="#10B981" opacity="0.35"/>
    </g>
    <!-- Test tube 2 -->
    <g transform="translate(38,0)">
      <rect x="-9" y="-75" width="18" height="80" rx="9 9 0 0" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.8"/>
      <path d="M -9 5 Q -9 20 0 20 Q 9 20 9 5 Z" fill="#8B5CF6" opacity="0.8"/>
      <rect x="-9" y="-30" width="18" height="35" rx="0 0 9 9" fill="#8B5CF6" opacity="0.35"/>
    </g>
    <!-- Test tube 3 -->
    <g transform="translate(76,0)">
      <rect x="-9" y="-90" width="18" height="95" rx="9 9 0 0" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.8"/>
      <path d="M -9 5 Q -9 20 0 20 Q 9 20 9 5 Z" fill="#0EA5E9" opacity="0.8"/>
      <rect x="-9" y="-55" width="18" height="60" rx="0 0 9 9" fill="#0EA5E9" opacity="0.35"/>
    </g>
  </g>
  <!-- Petri dish -->
  <g transform="translate(430,260)">
    <ellipse cx="0" cy="0" rx="42" ry="12" fill="none" stroke="#10B981" stroke-width="2" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="42" ry="12" fill="#10B981" opacity="0.06"/>
    <!-- Colonies -->
    <circle cx="-15" cy="-2" r="7" fill="#10B981" opacity="0.25"/>
    <circle cx="8" cy="3" r="5" fill="#8B5CF6" opacity="0.25"/>
    <circle cx="22" cy="-4" r="6" fill="#0EA5E9" opacity="0.2"/>
    <circle cx="-5" cy="5" r="4" fill="#10B981" opacity="0.2"/>
  </g>
  <!-- DNA helix accent (top left) -->
  <g transform="translate(110,170)" opacity="0.35">
    <path d="M -15 -80 Q 15 -60 -15 -40 Q 15 -20 -15 0 Q 15 20 -15 40 Q 15 60 -15 80" fill="none" stroke="#8B5CF6" stroke-width="2.5"/>
    <path d="M 15 -80 Q -15 -60 15 -40 Q -15 -20 15 0 Q -15 20 15 40 Q -15 60 15 80" fill="none" stroke="#10B981" stroke-width="2.5"/>
    <line x1="-15" y1="-80" x2="15" y2="-80" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-13" y1="-60" x2="13" y2="-60" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-15" y1="-40" x2="15" y2="-40" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-13" y1="-20" x2="13" y2="-20" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-13" y1="20" x2="13" y2="20" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-15" y1="40" x2="15" y2="40" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-13" y1="60" x2="13" y2="60" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-15" y1="80" x2="15" y2="80" stroke="#64748B" stroke-width="1.5"/>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="322" width="600" height="78" fill="rgba(0,0,0,0.4)"/>
  <line x1="48" y1="322" x2="552" y2="322" stroke="#8B5CF6" stroke-width="2" opacity="0.6"/>
  <text x="300" y="357" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Laboratories</text>
  <text x="300" y="382" font-family="Arial,Helvetica,sans-serif" font-size="18" fill="#8B5CF6" text-anchor="middle" letter-spacing="1">Diagnostic Kits · Testing Equipment · Culture Media</text>
</svg>
