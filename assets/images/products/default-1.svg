  <text x="300" y="357" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Veterinary Medicines</text>
  <text x="300" y="382" font-family="Arial,Helvetica,sans-serif" font-size="18" fill="#10B981" text-anchor="middle" letter-spacing="1">Antibiotics · Vaccines · Antiparasitics · Vitamins</text>
