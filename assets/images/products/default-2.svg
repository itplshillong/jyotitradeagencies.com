<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#162235"/>
    </linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="510" cy="70" r="130" fill="#0EA5E9" opacity="0.05"/>
  <circle cx="90" cy="330" r="100" fill="#10B981" opacity="0.05"/>
  <!-- Scalpel handle -->
  <g transform="translate(220,190) rotate(-35)">
    <rect x="-5" y="-90" width="10" height="165" rx="5" fill="#94A3B8"/>
    <rect x="-4" y="-88" width="5" height="160" rx="3" fill="white" opacity="0.15"/>
    <!-- Scalpel blade -->
    <path d="M -8 75 Q 0 95 8 75 L 5 110 L -5 110 Z" fill="url(#ac)"/>
    <path d="M -4 80 Q 0 92 4 80 L 2 108 L -2 108 Z" fill="white" opacity="0.2"/>
    <!-- Handle ridges -->
    <rect x="-6" y="20" width="12" height="3" rx="1" fill="#64748B"/>
    <rect x="-6" y="30" width="12" height="3" rx="1" fill="#64748B"/>
    <rect x="-6" y="40" width="12" height="3" rx="1" fill="#64748B"/>
    <rect x="-6" y="50" width="12" height="3" rx="1" fill="#64748B"/>
  </g>
  <!-- Scissors -->
  <g transform="translate(330,180)">
    <!-- Blade 1 -->
    <path d="M 0 -80 L -8 60 Q -4 80 8 80 Q 20 80 16 60 L 8 -80 Z" fill="#0EA5E9" opacity="0.8"/>
    <path d="M 2 -78 L -3 58 Q 0 72 6 70 L 12 -78 Z" fill="white" opacity="0.12"/>
    <!-- Blade 2 -->
    <path d="M 0 -80 L 28 60 Q 32 80 44 80 Q 56 80 52 60 L 16 -80 Z" fill="#0EA5E9" opacity="0.6"/>
    <!-- Screw -->
    <circle cx="8" cy="-40" r="6" fill="#475569"/>
    <circle cx="8" cy="-40" r="3" fill="#94A3B8"/>
    <!-- Handles (rings) -->
    <circle cx="-4" cy="90" r="18" fill="none" stroke="#0EA5E9" stroke-width="5" opacity="0.8"/>
    <circle cx="44" cy="90" r="18" fill="none" stroke="#0EA5E9" stroke-width="5" opacity="0.6"/>
  </g>
  <!-- Forceps / clamp -->
  <g transform="translate(430,185) rotate(20)">
    <rect x="-4" y="-70" width="8" height="130" rx="4" fill="#64748B" opacity="0.8"/>
    <rect x="8" y="-70" width="8" height="130" rx="4" fill="#64748B" opacity="0.7"/>
    <!-- Teeth at top -->
    <path d="M -4 -70 L -10 -90 L -2 -80 L 4 -90 L 12 -80 L 16 -90 L 16 -70 Z" fill="#10B981" opacity="0.8"/>
    <!-- Ring at bottom -->
    <ellipse cx="6" cy="65" rx="18" ry="10" fill="none" stroke="#10B981" stroke-width="4" opacity="0.7"/>
    <!-- Ratchet -->
    <rect x="-2" y="-15" width="16" height="5" rx="2" fill="#10B981" opacity="0.5"/>
  </g>
  <!-- Needle holder -->
  <g transform="translate(155,170) rotate(-15)">
    <rect x="-5" y="-75" width="10" height="150" rx="5" fill="#475569" opacity="0.9"/>
    <path d="M -5 -75 Q 0 -100 5 -75 Z" fill="#94A3B8"/>
    <ellipse cx="0" cy="70" rx="16" ry="9" fill="none" stroke="#64748B" stroke-width="4"/>
  </g>
  <!-- Sparkle accents -->
  <circle cx="490" cy="130" r="4" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="500" cy="150" r="2.5" fill="#10B981" opacity="0.5"/>
  <circle cx="120" cy="280" r="3" fill="#0EA5E9" opacity="0.4"/>
  <!-- Bottom bar -->
  <rect x="0" y="322" width="600" height="78" fill="rgba(0,0,0,0.4)"/>
  <line x1="48" y1="322" x2="552" y2="322" stroke="#0EA5E9" stroke-width="2" opacity="0.55"/>
  <text x="300" y="357" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Equipments / Instruments</text>
  <text x="300" y="382" font-family="Arial,Helvetica,sans-serif" font-size="18" fill="#0EA5E9" text-anchor="middle" letter-spacing="1">Forceps · Scalpels · Scissors · Retractors</text>
</svg>
