<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a2a2a"/>
    </linearGradient>
    <linearGradient id="gr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="510" cy="65" r="140" fill="#10B981" opacity="0.05"/>
  <circle cx="90" cy="340" r="100" fill="#F472B6" opacity="0.04"/>
  <!-- Heart -->
  <g transform="translate(200,175)">
    <path d="M 0 60 C 0 60 -80 15 -80 -30 C -80 -70 -40 -72 0 -40 C 40 -72 80 -70 80 -30 C 80 15 0 60 0 60 Z" fill="#10B981" opacity="0.8"/>
    <path d="M 0 60 C 0 60 -80 15 -80 -30 C -80 -70 -40 -72 0 -40 C 40 -72 80 -70 80 -30 C 80 15 0 60 0 60 Z" fill="none" stroke="#34D399" stroke-width="3"/>
    <!-- EKG line -->
    <polyline points="-65,5 -45,5 -35,-28 -22,40 -10,-12 0,-12 12,5 65,5" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <!-- Shine -->
    <path d="M -30 -60 Q -55 -40 -60 -15" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  </g>
  <!-- Supplement bottle (center right) -->
  <g transform="translate(350,180)">
    <rect x="-24" y="-65" width="48" height="120" rx="10" fill="#0EA5E9" opacity="0.8"/>
    <rect x="-18" y="-80" width="36" height="18" rx="5" fill="#075985"/>
    <rect x="-16" y="-32" width="32" height="5" rx="2" fill="white" opacity="0.4"/>
    <rect x="-16" y="-20" width="32" height="5" rx="2" fill="white" opacity="0.3"/>
    <rect x="-16" y="-8" width="22" height="5" rx="2" fill="white" opacity="0.2"/>
    <!-- Label cross -->
    <rect x="-5" y="15" width="10" height="26" rx="3" fill="white" opacity="0.3"/>
    <rect x="-13" y="23" width="26" height="10" rx="3" fill="white" opacity="0.3"/>
    <rect x="-18" y="-65" width="8" height="120" rx="4" fill="white" opacity="0.07"/>
  </g>
  <!-- Bandage / plaster -->
  <g transform="translate(430,160) rotate(-15)">
    <rect x="-50" y="-18" width="100" height="36" rx="8" fill="#F9A8D4" opacity="0.75"/>
    <rect x="-18" y="-18" width="36" height="36" fill="#E879A6" opacity="0.55"/>
    <!-- Pad holes -->
    <circle cx="-6" cy="-5" r="3" fill="#F9A8D4" opacity="0.6"/>
    <circle cx="6" cy="-5" r="3" fill="#F9A8D4" opacity="0.6"/>
    <circle cx="-6" cy="5" r="3" fill="#F9A8D4" opacity="0.6"/>
    <circle cx="6" cy="5" r="3" fill="#F9A8D4" opacity="0.6"/>
    <!-- Adhesive texture -->
    <rect x="-50" y="-18" width="32" height="36" rx="8 0 0 8" fill="white" opacity="0.06"/>
    <rect x="18" y="-18" width="32" height="36" rx="0 8 8 0" fill="white" opacity="0.06"/>
    <line x1="-45" y1="-8" x2="-22" y2="-8" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="-45" y1="0" x2="-22" y2="0" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="-45" y1="8" x2="-22" y2="8" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="22" y1="-8" x2="45" y2="-8" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="22" y1="0" x2="45" y2="0" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="22" y1="8" x2="45" y2="8" stroke="white" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Vitamin/supplement pills scattered -->
  <g transform="translate(455,230) rotate(-20)">
    <rect x="-28" y="-12" width="56" height="24" rx="12" fill="#F59E0B" opacity="0.75"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#D97706" stroke-width="1.5"/>
  </g>
  <g transform="translate(475,260) rotate(25)">
    <rect x="-22" y="-10" width="44" height="20" rx="10" fill="#10B981" opacity="0.7"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#059669" stroke-width="1.5"/>
  </g>
  <!-- Paw print (animal health) -->
  <g transform="translate(130,260)" fill="#10B981" opacity="0.35">
    <circle cx="0" cy="0" r="14"/>
    <circle cx="-18" cy="-18" r="8"/>
    <circle cx="0" cy="-22" r="8"/>
    <circle cx="18" cy="-18" r="8"/>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="322" width="600" height="78" fill="rgba(0,0,0,0.4)"/>
  <line x1="48" y1="322" x2="552" y2="322" stroke="#10B981" stroke-width="2" opacity="0.55"/>
  <text x="300" y="357" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Health Care Products</text>
  <text x="300" y="382" font-family="Arial,Helvetica,sans-serif" font-size="18" fill="#10B981" text-anchor="middle" letter-spacing="1">Supplements · Wound Care · Grooming · Preventive</text>
</svg>
