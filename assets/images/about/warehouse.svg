    <rect x="-28" y="-45" width="12" height="12" rx="2"/>
    <line x1="20" y1="-35" x2="50" y2="-35" stroke="#64748B" stroke-width="5"/>
    <line x1="20" y1="-10" x2="50" y2="-10" stroke="#64748B" stroke-width="5"/>
    <line x1="50" y1="-55" x2="50" y2="-10" stroke="#64748B" stroke-width="4"/>
    <circle cx="-15" cy="22" r="10" fill="#475569"/>
    <circle cx="18" cy="22" r="10" fill="#475569"/>
    <circle cx="-15" cy="22" r="4" fill="#334155"/>
    <circle cx="18" cy="22" r="4" fill="#334155"/>
