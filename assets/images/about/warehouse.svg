  <rect x="312" y="260" width="120" height="100" rx="2" fill="#162032" opacity="0.95"/>
  <line x1="334" y1="260" x2="334" y2="360" stroke="#334155" stroke-width="2"/>
  <line x1="356" y1="260" x2="356" y2="360" stroke="#334155" stroke-width="2"/>
  <line x1="378" y1="260" x2="378" y2="360" stroke="#334155" stroke-width="2"/>
  <line x1="400" y1="260" x2="400" y2="360" stroke="#334155" stroke-width="2"/>
  <rect x="312" y="280" width="120" height="3" fill="#334155" opacity="0.5"/>
  <rect x="312" y="300" width="120" height="3" fill="#334155" opacity="0.5"/>
  <rect x="302" y="257" width="140" height="6" rx="2" fill="#475569"/>
  <!-- High windows strip -->
  <rect x="68" y="192" width="68" height="28" rx="3" fill="#F59E0B" opacity="0.35"/>
  <rect x="146" y="192" width="68" height="28" rx="3" fill="#F59E0B" opacity="0.30"/>
  <rect x="224" y="192" width="68" height="28" rx="3" fill="#F59E0B" opacity="0.38"/>
  <rect x="302" y="192" width="68" height="28" rx="3" fill="#F59E0B" opacity="0.25"/>
  <rect x="380" y="192" width="68" height="28" rx="3" fill="#F59E0B" opacity="0.30"/>
  <rect x="458" y="192" width="68" height="28" rx="3" fill="#F59E0B" opacity="0.35"/>
