<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1c150a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="550" cy="50" r="110" fill="#D97706" opacity="0.05"/>
  <!-- Warehouse building exterior -->
  <!-- Main warehouse body -->
  <rect x="40" y="170" width="520" height="190" fill="#1E293B" opacity="0.88"/>
  <!-- Roof pitched -->
  <polygon points="40,170 300,90 560,170" fill="#162032" opacity="0.9"/>
  <!-- Roof ridge highlight -->
  <line x1="40" y1="170" x2="300" y2="90" stroke="#334155" stroke-width="3"/>
  <line x1="300" y1="90" x2="560" y2="170" stroke="#334155" stroke-width="3"/>
  <!-- Ventilation ridge on roof -->
  <rect x="256" y="88" width="88" height="20" rx="4" fill="#0F172A"/>
  <!-- Large warehouse doors -->
  <rect x="160" y="260" width="130" height="100" rx="2" fill="#162032" opacity="0.95"/>
