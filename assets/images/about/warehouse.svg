  <!-- Boxes stacked outside -->
  <g transform="translate(90,310)" opacity="0.5">
    <rect x="0" y="0" width="35" height="30" rx="2" fill="#0EA5E9" opacity="0.6"/>
    <rect x="0" y="-32" width="35" height="30" rx="2" fill="#0EA5E9" opacity="0.5"/>
