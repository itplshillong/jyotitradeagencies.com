    <rect x="330" y="270" width="4" height="88" fill="#10B981" opacity="0.4"/>
    <rect x="346" y="270" width="4" height="88" fill="#10B981" opacity="0.4"/>
    <rect x="362" y="270" width="4" height="88" fill="#10B981" opacity="0.4"/>
    <rect x="378" y="270" width="4" height="88" fill="#10B981" opacity="0.4"/>
    <rect x="394" y="270" width="4" height="88" fill="#10B981" opacity="0.4"/>
    <rect x="314" y="290" width="88" height="4" fill="#64748B" opacity="0.4"/>
    <rect x="314" y="312" width="88" height="4" fill="#64748B" opacity="0.4"/>
    <rect x="314" y="334" width="88" height="4" fill="#64748B" opacity="0.4"/>
    <!-- Boxes on shelves -->
    <rect x="317" y="293" width="10" height="18" rx="1" fill="#0EA5E9" opacity="0.7"/>
    <rect x="330" y="293" width="10" height="18" rx="1" fill="#10B981" opacity="0.7"/>
    <rect x="343" y="295" width="10" height="16" rx="1" fill="#0EA5E9" opacity="0.6"/>
