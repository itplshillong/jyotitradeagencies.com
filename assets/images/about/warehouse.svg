  <!-- Bottom bar -->
  <rect x="0" y="322" width="600" height="78" fill="rgba(0,0,0,0.42)"/>
  <line x1="48" y1="322" x2="552" y2="322" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <text x="300" y="357" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">Storage Facility</text>
  <text x="300" y="382" font-family="Arial,Helvetica,sans-serif" font-size="12.5" fill="#FCD34D" text-anchor="middle" letter-spacing="1">Temperature-Controlled · High-Capacity · Secure</text>
</svg>
