<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0f05"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Barn silhouette (bg) -->
  <rect x="420" y="110" width="130" height="100" fill="#7C2D12" opacity="0.2"/>
  <polygon points="420,110 485,70 550,110" fill="#991B1B" opacity="0.15"/>
  <!-- Ground -->
  <rect x="0" y="250" width="600" height="50" fill="#92400E" opacity="0.15"/>
  <!-- Wheat/grain stalks -->
  <g opacity="0.25">
    <line x1="80" y1="250" x2="85" y2="185" stroke="#D97706" stroke-width="3"/>
    <ellipse cx="85" cy="182" rx="5" ry="10" fill="#D97706"/>
    <line x1="100" y1="250" x2="103" y2="190" stroke="#D97706" stroke-width="3"/>
    <ellipse cx="103" cy="187" rx="5" ry="9" fill="#D97706"/>
    <line x1="118" y1="250" x2="120" y2="195" stroke="#D97706" stroke-width="3"/>
    <ellipse cx="120" cy="192" rx="4" ry="8" fill="#D97706"/>
  </g>
  <!-- Chicken silhouette (main) -->
  <g transform="translate(260,160)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="72" ry="50" fill="#F59E0B" opacity="0.88"/>
    <!-- Wing -->
    <path d="M 20 0 Q 70 -15 68 25 Q 55 40 20 35 Z" fill="#D97706" opacity="0.8"/>
    <!-- Tail feathers -->
    <path d="M 68 15 Q 95 -5 90 30" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
    <path d="M 68 20 Q 100 15 98 40" fill="none" stroke="#D97706" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <path d="M 68 25 Q 98 30 92 52" fill="none" stroke="#F59E0B" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
    <!-- Neck -->
    <ellipse cx="-55" cy="-15" rx="22" ry="28" fill="#F59E0B" opacity="0.9"/>
    <!-- Head -->
    <circle cx="-65" cy="-50" r="24" fill="#F59E0B" opacity="0.9"/>
    <!-- Beak -->
    <path d="M -82 -52 L -96 -46 L -82 -40 Z" fill="#D97706"/>
    <line x1="-82" y1="-46" x2="-96" y2="-46" stroke="#B45309" stroke-width="1"/>
    <!-- Eye -->
    <circle cx="-60" cy="-54" r="6" fill="#1E293B"/>
    <circle cx="-58" cy="-56" r="2" fill="white"/>
    <!-- Comb -->
    <path d="M -72 -72 Q -68 -85 -62 -72 Q -58 -85 -52 -72 Q -48 -82 -44 -72" fill="none" stroke="#DC2626" stroke-width="5" stroke-linecap="round"/>
    <!-- Wattle -->
    <ellipse cx="-78" cy="-40" rx="7" ry="10" fill="#DC2626" opacity="0.9"/>
    <!-- Legs -->
    <line x1="-25" y1="68" x2="-30" y2="105" stroke="#D97706" stroke-width="6" stroke-linecap="round"/>
    <line x1="-30" y1="105" x2="-45" y2="112" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
    <line x1="-30" y1="105" x2="-20" y2="115" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
    <line x1="-30" y1="105" x2="-32" y2="118" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>
    <line x1="15" y1="68" x2="20" y2="105" stroke="#D97706" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="105" x2="5" y2="112" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="105" x2="32" y2="115" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
    <line x1="20" y1="105" x2="20" y2="118" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Egg (foreground) -->
  <ellipse cx="170" cy="248" rx="16" ry="20" fill="#FEF3C7" opacity="0.6"/>
  <ellipse cx="145" cy="252" rx="13" ry="17" fill="#FEF3C7" opacity="0.5"/>
  <!-- Feather accent -->
  <path d="M 450 180 Q 465 165 455 150 Q 445 165 450 180 Z" fill="#F59E0B" opacity="0.25"/>
  <!-- Bottom bar -->
  <rect x="0" y="238" width="600" height="62" fill="rgba(0,0,0,0.45)"/>
  <line x1="50" y1="238" x2="550" y2="238" stroke="#D97706" stroke-width="2" opacity="0.6"/>
  <text x="300" y="267" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Poultry Industry</text>
  <text x="300" y="290" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#FCD34D" text-anchor="middle" letter-spacing="0.8">Broiler · Layer · Breeder · Vaccines · Feed Supplements</text>
</svg>
