<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Ground -->
  <rect x="0" y="255" width="600" height="45" fill="#581C87" opacity="0.12"/>
  <!-- Mud puddle (typical swine environment) -->
  <ellipse cx="380" cy="268" rx="65" ry="12" fill="#7C3AED" opacity="0.1"/>
  <!-- Pig silhouette (main) -->
  <g transform="translate(265,150)">
    <!-- Body (rounded, stocky) -->
    <ellipse cx="0" cy="25" rx="90" ry="58" fill="#FDA4AF" opacity="0.88"/>
    <!-- Head -->
    <ellipse cx="-80" cy="-5" rx="50" ry="45" fill="#FDA4AF" opacity="0.88"/>
    <!-- Snout/disc -->
    <ellipse cx="-118" cy="5" rx="22" ry="18" fill="#FB7185" opacity="0.9"/>
    <ellipse cx="-125" cy="3" rx="6" ry="5" fill="#9F1239" opacity="0.6"/>
    <ellipse cx="-111" cy="3" rx="6" ry="5" fill="#9F1239" opacity="0.6"/>
    <!-- Eyes -->
    <circle cx="-74" cy="-18" r="7" fill="#1E293B"/>
    <circle cx="-72" cy="-20" r="2.5" fill="white"/>
    <!-- Ear (floppy) -->
    <path d="M -62 -42 Q -45 -72 -35 -50 Q -40 -28 -55 -28 Z" fill="#FB7185" opacity="0.9"/>
    <path d="M -92 -42 Q -108 -68 -100 -48 Q -96 -30 -82 -32 Z" fill="#FB7185" opacity="0.85"/>
    <!-- Belly fold -->
    <path d="M -75 35 Q -10 50 45 35" fill="none" stroke="#FB7185" stroke-width="2.5" opacity="0.4"/>
    <!-- Legs (4 stubby) -->
    <rect x="-70" y="78" width="22" height="38" rx="10" fill="#FDA4AF" opacity="0.85"/>
    <rect x="-40" y="78" width="22" height="38" rx="10" fill="#FB7185" opacity="0.8"/>
    <rect x="22" y="78" width="22" height="38" rx="10" fill="#FB7185" opacity="0.8"/>
    <rect x="52" y="78" width="22" height="38" rx="10" fill="#FDA4AF" opacity="0.85"/>
    <!-- Curly tail -->
    <path d="M 90 20 Q 115 10 110 32 Q 106 45 118 40" fill="none" stroke="#FB7185" stroke-width="6" stroke-linecap="round"/>
    <!-- Body shading -->
    <ellipse cx="20" cy="10" rx="30" ry="20" fill="white" opacity="0.07"/>
  </g>
  <!-- Small pig (background) -->
  <g transform="translate(450,195)" opacity="0.5">
    <ellipse cx="0" cy="12" rx="40" ry="26" fill="#FDA4AF"/>
    <ellipse cx="-36" cy="-2" rx="24" ry="20" fill="#FDA4AF"/>
    <ellipse cx="-56" cy="2" rx="10" ry="8" fill="#FB7185"/>
    <circle cx="-31" cy="-8" r="3.5" fill="#1E293B"/>
    <path d="M -26 -20 Q -18 -32 -14 -22 Q -18 -12 -24 -13 Z" fill="#FB7185"/>
    <rect x="-30" y="35" width="10" height="18" rx="5" fill="#FDA4AF"/>
    <rect x="-15" y="35" width="10" height="18" rx="5" fill="#FDA4AF"/>
    <rect x="5" y="35" width="10" height="18" rx="5" fill="#FDA4AF"/>
    <rect x="20" y="35" width="10" height="18" rx="5" fill="#FDA4AF"/>
  </g>
  <!-- Feed bag accent -->
  <rect x="90" y="200" width="40" height="52" rx="4" fill="#78350F" opacity="0.25"/>
  <text x="110" y="232" font-family="Arial" font-size="9" fill="#FDE68A" text-anchor="middle" opacity="0.4">FEED</text>
  <!-- Bottom bar -->
  <rect x="0" y="238" width="600" height="62" fill="rgba(0,0,0,0.45)"/>
  <line x1="50" y1="238" x2="550" y2="238" stroke="#C026D3" stroke-width="2" opacity="0.5"/>
  <text x="300" y="267" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Swine Industry</text>
  <text x="300" y="290" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#F0ABFC" text-anchor="middle" letter-spacing="0.8">Growth Promoters · Vaccines · Treatment Protocols</text>
</svg>
