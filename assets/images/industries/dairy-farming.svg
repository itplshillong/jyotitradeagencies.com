<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0d2918"/>
    </linearGradient>
    <linearGradient id="gr" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#15803D"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Ground / grass strip -->
  <rect x="0" y="240" width="600" height="60" fill="#15803D" opacity="0.2"/>
  <ellipse cx="300" cy="240" rx="320" ry="20" fill="#15803D" opacity="0.15"/>
  <!-- Fence posts (background) -->
  <rect x="60" y="205" width="8" height="40" rx="2" fill="#475569" opacity="0.4"/>
  <line x1="60" y1="215" x2="540" y2="215" stroke="#475569" stroke-width="3" opacity="0.3"/>
  <line x1="60" y1="228" x2="540" y2="228" stroke="#475569" stroke-width="3" opacity="0.3"/>
  <rect x="180" y="205" width="8" height="40" rx="2" fill="#475569" opacity="0.4"/>
  <rect x="300" y="205" width="8" height="40" rx="2" fill="#475569" opacity="0.4"/>
  <rect x="420" y="205" width="8" height="40" rx="2" fill="#475569" opacity="0.4"/>
  <rect x="530" y="205" width="8" height="40" rx="2" fill="#475569" opacity="0.4"/>
  <!-- Cow silhouette (center) -->
  <g transform="translate(300,155)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="88" ry="52" fill="#E2E8F0" opacity="0.85"/>
    <!-- Head -->
    <ellipse cx="-78" cy="-12" rx="38" ry="30" fill="#E2E8F0" opacity="0.85"/>
    <!-- Snout/muzzle -->
    <ellipse cx="-102" cy="-4" rx="18" ry="14" fill="#CBD5E1" opacity="0.9"/>
    <!-- Nostril left -->
    <ellipse cx="-108" cy="-2" rx="4" ry="3" fill="#94A3B8"/>
    <!-- Nostril right -->
    <ellipse cx="-96" cy="-2" rx="4" ry="3" fill="#94A3B8"/>
    <!-- Eye -->
    <circle cx="-72" cy="-20" r="5" fill="#1E293B"/>
    <circle cx="-70" cy="-22" r="1.5" fill="white"/>
    <!-- Ear -->
    <ellipse cx="-56" cy="-38" rx="10" ry="14" fill="#CBD5E1" opacity="0.9"/>
    <!-- Horn -->
    <path d="M -62 -38 Q -55 -65 -42 -55" fill="none" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
    <!-- Cow spots -->
    <ellipse cx="20" cy="10" rx="25" ry="18" fill="#0F172A" opacity="0.25"/>
    <ellipse cx="-15" cy="35" rx="18" ry="12" fill="#0F172A" opacity="0.2"/>
    <ellipse cx="55" cy="5" rx="14" ry="20" fill="#0F172A" opacity="0.18"/>
    <!-- Udder -->
    <ellipse cx="5" cy="68" rx="28" ry="14" fill="#FDA4AF" opacity="0.7"/>
    <circle cx="-12" cy="78" r="4" fill="#FB7185" opacity="0.7"/>
    <circle cx="-3" cy="80" r="4" fill="#FB7185" opacity="0.7"/>
    <circle cx="8" cy="80" r="4" fill="#FB7185" opacity="0.7"/>
    <circle cx="19" cy="78" r="4" fill="#FB7185" opacity="0.7"/>
    <!-- Legs -->
    <rect x="-60" y="68" width="16" height="42" rx="7" fill="#E2E8F0" opacity="0.85"/>
    <rect x="-35" y="68" width="16" height="42" rx="7" fill="#CBD5E1" opacity="0.85"/>
    <rect x="25" y="68" width="16" height="42" rx="7" fill="#CBD5E1" opacity="0.85"/>
    <rect x="52" y="68" width="16" height="42" rx="7" fill="#E2E8F0" opacity="0.85"/>
    <!-- Tail -->
    <path d="M 88 20 Q 110 10 105 40 Q 103 55 115 60" fill="none" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <ellipse cx="116" cy="64" rx="8" ry="5" fill="#94A3B8"/>
  </g>
  <!-- Milk drop -->
  <g transform="translate(490,120)" fill="#E2E8F0" opacity="0.4">
    <path d="M 0 -22 Q 12 0 12 10 A 12 12 0 0 1 -12 10 Q -12 0 0 -22 Z"/>
  </g>
  <g transform="translate(510,140)" fill="#E2E8F0" opacity="0.25">
    <path d="M 0 -16 Q 9 0 9 7 A 9 9 0 0 1 -9 7 Q -9 0 0 -16 Z"/>
  </g>
  <!-- Sun rays top right -->
  <circle cx="540" cy="50" r="22" fill="#F59E0B" opacity="0.12"/>
  <circle cx="540" cy="50" r="35" fill="#F59E0B" opacity="0.06"/>
  <!-- Bottom bar -->
  <rect x="0" y="238" width="600" height="62" fill="rgba(0,0,0,0.45)"/>
  <line x1="50" y1="238" x2="550" y2="238" stroke="#15803D" stroke-width="2" opacity="0.6"/>
  <text x="300" y="267" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Dairy Farming</text>
  <text x="300" y="290" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#4ADE80" text-anchor="middle" letter-spacing="0.8">Cattle Health · Milk Production · Disease Prevention</text>
</svg>
