  <text x="300" y="267" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Veterinary Research</text>
  <text x="300" y="290" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#C4B5FD" text-anchor="middle" letter-spacing="0.8">Diagnostic Kits · Reagents · Research Institutes</text>
