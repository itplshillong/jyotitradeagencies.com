    <circle cx="22" cy="-78" r="5" fill="#10B981" opacity="0.8"/>
    <circle cx="-22" cy="-56" r="5" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="22" cy="-34" r="5" fill="#10B981" opacity="0.8"/>
    <circle cx="-22" cy="-12" r="5" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="22" cy="10" r="5" fill="#10B981" opacity="0.8"/>
    <circle cx="-22" cy="32" r="5" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="22" cy="54" r="5" fill="#10B981" opacity="0.8"/>
    <circle cx="-22" cy="76" r="5" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="22" cy="98" r="5" fill="#10B981" opacity="0.8"/>
