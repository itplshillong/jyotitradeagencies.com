<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0f1f12"/>
    </linearGradient>
    <linearGradient id="skyg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Sky gradient tint -->
  <rect width="600" height="180" fill="url(#skyg)"/>
  <!-- Distant hills -->
  <ellipse cx="150" cy="260" rx="200" ry="60" fill="#14532D" opacity="0.12"/>
  <ellipse cx="450" cy="260" rx="200" ry="60" fill="#14532D" opacity="0.10"/>
  <!-- Ground / track -->
  <rect x="0" y="255" width="600" height="45" fill="#14532D" opacity="0.2"/>
  <!-- Fence rail -->
  <line x1="0" y1="210" x2="600" y2="210" stroke="#475569" stroke-width="3" opacity="0.25"/>
  <line x1="0" y1="222" x2="600" y2="222" stroke="#475569" stroke-width="2.5" opacity="0.2"/>
  <rect x="40" y="200" width="7" height="55" rx="2" fill="#475569" opacity="0.25"/>
  <rect x="150" y="200" width="7" height="55" rx="2" fill="#475569" opacity="0.25"/>
  <rect x="260" y="200" width="7" height="55" rx="2" fill="#475569" opacity="0.25"/>
  <rect x="370" y="200" width="7" height="55" rx="2" fill="#475569" opacity="0.25"/>
  <rect x="480" y="200" width="7" height="55" rx="2" fill="#475569" opacity="0.25"/>
  <rect x="560" y="200" width="7" height="55" rx="2" fill="#475569" opacity="0.25"/>
  <!-- Horse silhouette (galloping) -->
  <g transform="translate(300,148)">
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="95" ry="48" fill="#D4A574" opacity="0.88"/>
    <!-- Neck -->
    <path d="M -68 -15 Q -85 -55 -72 -78 Q -56 -68 -52 -45 Q -50 -25 -55 -8 Z" fill="#D4A574" opacity="0.88"/>
    <!-- Head -->
    <ellipse cx="-88" cy="-88" rx="28" ry="18" fill="#D4A574" opacity="0.88" transform="rotate(-30, -88, -88)"/>
    <!-- Snout -->
    <path d="M -102 -100 Q -118 -96 -114 -82 Q -100 -78 -96 -88 Z" fill="#C4956A" opacity="0.9"/>
    <!-- Nostril -->
    <ellipse cx="-112" cy="-90" rx="4" ry="3" fill="#8B5E3C" opacity="0.7"/>
    <!-- Eye -->
    <circle cx="-82" cy="-96" r="5" fill="#1E293B"/>
    <circle cx="-80" cy="-98" r="1.5" fill="white"/>
    <!-- Ear -->
    <polygon points="-68,-104 -60,-125 -54,-102" fill="#C4956A" opacity="0.9"/>
    <!-- Mane -->
    <path d="M -68 -78 Q -58 -60 -52 -45" fill="none" stroke="#8B5E3C" stroke-width="10" stroke-linecap="round"/>
    <path d="M -64 -82 Q -50 -62 -46 -48" fill="none" stroke="#6B3F1E" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    <!-- Body shading -->
    <ellipse cx="10" cy="0" rx="40" ry="22" fill="white" opacity="0.06"/>
    <!-- Galloping legs -->
    <!-- Front left (forward) -->
    <path d="M -50 52 Q -55 80 -48 100 Q -44 112 -36 115" fill="none" stroke="#C4956A" stroke-width="14" stroke-linecap="round"/>
    <!-- Front right (back) -->
    <path d="M -25 52 Q -15 70 -10 50" fill="none" stroke="#D4A574" stroke-width="12" stroke-linecap="round"/>
    <!-- Back left (forward) -->
    <path d="M 55 52 Q 70 75 78 68 Q 86 60 90 45" fill="none" stroke="#D4A574" stroke-width="12" stroke-linecap="round"/>
    <!-- Back right (extended back) -->
    <path d="M 70 52 Q 75 80 80 100 Q 84 112 90 116" fill="none" stroke="#C4956A" stroke-width="14" stroke-linecap="round"/>
    <!-- Hooves -->
    <ellipse cx="-36" cy="118" rx="11" ry="5" fill="#1E293B" opacity="0.8"/>
    <ellipse cx="91" cy="118" rx="11" ry="5" fill="#1E293B" opacity="0.8"/>
    <!-- Tail (flowing) -->
    <path d="M 94 8 Q 125 -15 130 20 Q 132 45 115 55 Q 100 62 96 50" fill="none" stroke="#8B5E3C" stroke-width="10" stroke-linecap="round"/>
    <path d="M 94 15 Q 128 0 130 28" fill="none" stroke="#6B3F1E" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <!-- Saddle area hint -->
    <ellipse cx="10" cy="-25" rx="35" ry="12" fill="#8B5E3C" opacity="0.2"/>
  </g>
  <!-- Horseshoe accent -->
  <g transform="translate(510,215)" fill="none" stroke="#D4A574" stroke-width="4" opacity="0.3">
    <path d="M -18 -18 A 18 18 0 0 1 18 -18 L 18 5 L -18 5 Z"/>
    <line x1="-18" y1="5" x2="-18" y2="18"/>
    <line x1="18" y1="5" x2="18" y2="18"/>
  </g>
  <!-- Stars accent -->
  <circle cx="80" cy="55" r="2" fill="white" opacity="0.2"/>
  <circle cx="520" cy="45" r="2" fill="white" opacity="0.2"/>
  <circle cx="150" cy="38" r="1.5" fill="white" opacity="0.15"/>
  <circle cx="470" cy="60" r="1.5" fill="white" opacity="0.15"/>
  <!-- Bottom bar -->
  <rect x="0" y="238" width="600" height="62" fill="rgba(0,0,0,0.45)"/>
  <line x1="50" y1="238" x2="550" y2="238" stroke="#D97706" stroke-width="2" opacity="0.55"/>
  <text x="300" y="267" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Equine Care</text>
  <text x="300" y="290" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#FCD34D" text-anchor="middle" letter-spacing="0.8">Health Management · Performance · Surgical Instruments</text>
</svg>
